<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POLYBETTOR</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05030a;
  --blue:#7dd3ff;
  --green:#39ff8f;
  --purple:#b07cff;
  --dim:#3a2a55;
  --muted:#6b5a8a;
  --text:#c8b8e8;
  --bright:#f0e8ff;
  --card:rgba(20,10,35,0.65);
  --border:rgba(176,124,255,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:
    radial-gradient(ellipse at 20% 0%, rgba(176,124,255,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(57,255,143,0.06) 0%, transparent 50%),
    var(--bg);
  color:var(--text);
  font-family:'Share Tech Mono',monospace;
  min-height:100vh;
  background-attachment:fixed;
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(176,124,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(125,211,255,0.04) 1px,transparent 1px);
  background-size:36px 36px;
  pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:20px 16px 40px;}

/* Header */
header{
  text-align:center;padding:18px 0 22px;
}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;}
.logo-icon{font-size:26px;filter:drop-shadow(0 0 10px var(--green));animation:flicker 4s ease-in-out infinite;}
@keyframes flicker{0%,100%{opacity:1;}48%{opacity:1;}50%{opacity:0.7;}52%{opacity:1;}}
h1{
  font-family:'Orbitron';font-size:22px;font-weight:900;letter-spacing:6px;
  color:var(--bright);
  text-shadow:0 0 12px rgba(125,211,255,0.5),0 0 24px rgba(176,124,255,0.3);
}
h1 em{color:var(--green);font-style:normal;text-shadow:0 0 12px rgba(57,255,143,0.6);}
.sub{font-size:9px;letter-spacing:4px;color:var(--muted);margin-top:6px;text-transform:uppercase;}
.status-row{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:14px;
}
.dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.4s ease-in-out infinite;}
.dot-on{background:var(--green);box-shadow:0 0 10px var(--green);}
.dot-off{background:#ff3366;box-shadow:0 0 10px #ff3366;animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}
.mode-pill{
  font-size:9px;letter-spacing:2px;padding:4px 12px;border-radius:20px;
  font-weight:bold;text-transform:uppercase;
}
.pill-dry{background:rgba(255,210,0,0.1);color:#ffd200;border:1px solid rgba(255,210,0,0.3);}
.pill-live{background:rgba(57,255,143,0.1);color:var(--green);border:1px solid rgba(57,255,143,0.35);box-shadow:0 0 14px rgba(57,255,143,0.15);}

/* Big balance display */
.balance-block{
  text-align:center;
  padding:28px 20px 24px;
  margin-bottom:16px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  backdrop-filter:blur(16px);
  position:relative;
  overflow:hidden;
}
.balance-block::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple),var(--blue),transparent);
}
.bal-lbl{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.bal-num{
  font-family:'Orbitron';font-weight:900;font-size:46px;
  color:var(--bright);
  text-shadow:0 0 20px rgba(125,211,255,0.4);
  line-height:1;
  transition:color 0.4s;
}
.bal-sub{font-size:10px;color:var(--muted);margin-top:10px;}

/* Stat grid: P/L, bet count, active */
.stat-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;
}
.stat-box{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  text-align:center;
  backdrop-filter:blur(16px);
  position:relative;
  transition:transform 0.2s;
}
.stat-box:active{transform:scale(0.98);}
.stat-box.full{grid-column:1/-1;}
.sb-lbl{font-size:8px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.sb-val{font-family:'Orbitron';font-size:24px;font-weight:700;transition:color 0.4s;}
.sb-sub{font-size:9px;color:var(--muted);margin-top:6px;}
.c-green{color:var(--green);text-shadow:0 0 12px rgba(57,255,143,0.4);}
.c-red{color:#ff3d6e;text-shadow:0 0 12px rgba(255,61,110,0.4);}
.c-blue{color:var(--blue);text-shadow:0 0 10px rgba(125,211,255,0.4);}
.c-purple{color:var(--purple);text-shadow:0 0 10px rgba(176,124,255,0.4);}
.c-neutral{color:var(--bright);}

/* Record pills */
.record-row{display:flex;justify-content:center;gap:14px;margin-top:8px;}
.record-pill{
  font-size:10px;padding:3px 10px;border-radius:10px;
  background:rgba(0,0,0,0.3);font-weight:bold;
}

/* Log panel */
.log-panel{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  backdrop-filter:blur(16px);
}
.log-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;
  background:rgba(0,0,0,0.25);
  border-bottom:1px solid var(--border);
}
.log-title{
  font-family:'Orbitron';font-size:9px;letter-spacing:3px;
  color:var(--purple);text-transform:uppercase;
}
.log-count{font-size:9px;color:var(--muted);}
.log-body{
  padding:10px 14px;height:220px;overflow-y:auto;
  font-size:10px;line-height:2;
}
.log-body::-webkit-scrollbar{width:3px;}
.log-body::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
.ll{display:flex;gap:8px;}
.lt{color:var(--dim);flex-shrink:0;font-size:9px;}
.lok{color:var(--green);}
.lerr{color:#ff3d6e;}
.lwarn{color:#ffd200;}
.linfo{color:var(--muted);}
.empty{text-align:center;padding:30px;color:var(--dim);font-size:9px;letter-spacing:2px;}

/* Mode toggle (sports/crypto view) */
.mode-switch{
  display:flex;gap:4px;justify-content:center;margin-bottom:16px;
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:12px;padding:3px;max-width:240px;margin-left:auto;margin-right:auto;
}
.mode-btn{
  flex:1;padding:7px 0;font-size:9px;letter-spacing:2px;
  background:transparent;border:none;color:var(--muted);
  cursor:pointer;border-radius:9px;transition:all 0.25s;
  font-family:'Share Tech Mono',monospace;text-transform:uppercase;
}
.mode-btn.active{
  background:linear-gradient(135deg,rgba(57,255,143,0.15),rgba(125,211,255,0.1));
  color:var(--green);
  box-shadow:0 0 10px rgba(57,255,143,0.15);
}

/* Footer */
footer{text-align:center;padding:24px 0 10px;}
.x-link{
  display:inline-flex;align-items:center;gap:7px;
  text-decoration:none;color:var(--muted);
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  padding:7px 16px;border-radius:20px;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.2);
  transition:all 0.3s;
}
.x-link:hover{color:var(--green);border-color:rgba(57,255,143,0.3);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-row">
      <span class="logo-icon">◈</span>
      <h1>POLY<em>BETTOR</em></h1>
    </div>
    <div class="sub">Prediction Market Engine</div>
    <div class="status-row">
      <div class="dot dot-on" id="dot"></div>
      <span style="font-size:9px;color:var(--muted)" id="status-txt">ONLINE</span>
      <span class="mode-pill pill-dry" id="mode-badge">DRY RUN</span>
    </div>
  </header>

  <div class="mode-switch">
    <button class="mode-btn active" data-mode="SPORTS" onclick="switchMode('SPORTS')">⚽ Sports</button>
    <button class="mode-btn" data-mode="CRYPTO" onclick="switchMode('CRYPTO')">₿ Crypto</button>
  </div>

  <!-- Balance -->
  <div class="balance-block">
    <div class="bal-lbl">Portfolio Balance</div>
    <div class="bal-num c-blue" id="balance">$—</div>
    <div class="bal-sub" id="balance-sub">— wagered</div>
  </div>

  <!-- Stats -->
  <div class="stat-grid">
    <div class="stat-box">
      <div class="sb-lbl">Total P/L</div>
      <div class="sb-val c-neutral" id="total-pnl">$0.00</div>
      <div class="sb-sub" id="total-pnl-sub">realized + open</div>
    </div>
    <div class="stat-box">
      <div class="sb-lbl">Active Bets</div>
      <div class="sb-val c-purple" id="active-bets">0</div>
      <div class="sb-sub" id="active-bets-sub">0 total placed</div>
    </div>
    <div class="stat-box full">
      <div class="sb-lbl">Win / Loss Record</div>
      <div class="sb-val c-green" id="win-rate">N/A</div>
      <div class="record-row">
        <span class="record-pill c-green" id="wins-pill">0 WINS</span>
        <span class="record-pill c-red" id="losses-pill">0 LOSSES</span>
      </div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-panel">
    <div class="log-head">
      <span class="log-title">System Log</span>
      <span class="log-count" id="log-count">0 entries</span>
    </div>
    <div class="log-body" id="log-body">
      <div class="ll"><span class="lt">[BOOT]</span><span class="linfo">POLYBETTOR INITIALIZING...</span></div>
    </div>
  </div>

  <footer>
    <a href="https://x.com/0xblaq?s=11" target="_blank" rel="noopener" class="x-link">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      Built by 0xblaq
    </a>
  </footer>

</div>

<script>
'use strict';
let currentMode='SPORTS';
let uiLogs=[];

async function switchMode(mode){
  if(mode===currentMode)return;
  const label=mode==='SPORTS'?'⚽ Sports':'₿ Crypto';
  const ok=window.confirm('Switch view to '+label+'?\n\nBoth bots keep running in the background regardless — this only changes what you see.');
  if(!ok)return;
  try{
    const res=await fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode})});
    const d=await res.json();
    currentMode=d.mode;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===currentMode));
  }catch(e){}
}

function renderLog(logs){
  const el=document.getElementById('log-body');
  if(!logs.length){el.innerHTML='<div class="empty">NO ACTIVITY YET</div>';return;}
  el.innerHTML=logs.map(l=>`<div class="ll"><span class="lt">[${l.ts}]</span><span class="l${l.type}">${l.msg}</span></div>`).join('');
  document.getElementById('log-count').textContent=logs.length+' entries';
}

async function refresh(){
  try{
    const [rootR,logR]=await Promise.allSettled([
      fetch('/').then(r=>r.json()),
      fetch('/log').then(r=>r.json()),
    ]);

    document.getElementById('dot').className='dot dot-on';
    document.getElementById('status-txt').textContent='ONLINE';

    if(rootR.status==='fulfilled'){
      const root=rootR.value;
      const s=root.stats||{};
      const isDry=root.settings?.dryRun!==false;

      if(root.mode&&root.mode!==currentMode){
        currentMode=root.mode;
        document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===currentMode));
      }

      const badge=document.getElementById('mode-badge');
      badge.textContent=isDry?'◎ DRY RUN':'⬤ LIVE';
      badge.className='mode-pill '+(isDry?'pill-dry':'pill-live');

      const sp=s.sports||{}, cr=s.crypto||{};
      const active=currentMode==='SPORTS'?sp:cr;

      const bankroll=parseFloat(root.config?.bankroll||70);
      const totalPnl=parseFloat(active.totalPnl||active.pnl||0);

      // Balance
      const balDisp=isDry?(s.dryBalance!=null?s.dryBalance:bankroll):(s.liveBalance!=null?s.liveBalance:bankroll);
      const balEl=document.getElementById('balance');
      balEl.textContent='$'+parseFloat(balDisp).toFixed(2);
      balEl.className='bal-num '+(totalPnl>0?'c-green':totalPnl<0?'c-red':'c-blue');
      document.getElementById('balance-sub').textContent='$'+parseFloat(active.totalWagered||0).toFixed(2)+' wagered this session';

      // Total P/L
      const pnlEl=document.getElementById('total-pnl');
      pnlEl.textContent=(totalPnl>=0?'+':'')+'$'+Math.abs(totalPnl).toFixed(2);
      pnlEl.className='sb-val '+(totalPnl>0?'c-green':totalPnl<0?'c-red':'c-neutral');
      const openPnl=parseFloat(active.openPnl||0);
      document.getElementById('total-pnl-sub').textContent='open '+(openPnl>=0?'+':'')+'$'+Math.abs(openPnl).toFixed(2);

      // Active bets
      document.getElementById('active-bets').textContent=active.activeBets||0;
      document.getElementById('active-bets-sub').textContent=(active.totalBets||0)+' total placed';

      // Win/loss
      document.getElementById('win-rate').textContent=active.winRate||'N/A';
      document.getElementById('wins-pill').textContent=(active.wins||0)+' WINS';
      document.getElementById('losses-pill').textContent=(active.losses||0)+' LOSSES';
    }

    if(logR.status==='fulfilled'){
      uiLogs=(logR.value||[]).slice(0,40).map(l=>({ts:(l.ts||'').slice(11,19)||'—',type:l.type,msg:(l.msg||'').slice(0,70)}));
      renderLog(uiLogs);
    }

  }catch(e){
    document.getElementById('dot').className='dot dot-off';
    document.getElementById('status-txt').textContent='OFFLINE';
  }
}

setInterval(refresh,3000);
refresh();
</script>
</body>
</html>
