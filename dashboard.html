<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BETO.GG</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#030805;
  --green:#39ff8f;
  --green2:rgba(57,255,143,0.55);
  --dim:rgba(57,255,143,0.25);
  --faint:rgba(57,255,143,0.08);
  --border:rgba(57,255,143,0.18);
  --red:#ff3d6e;
  --yellow:#ffd200;
}
html,body{min-height:100%;background:var(--bg);color:var(--green);font-family:'Share Tech Mono',monospace;}
/* CRT scanlines */
body::before{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px);}
/* phosphor grid */
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(57,255,143,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,143,0.025) 1px,transparent 1px);
  background-size:40px 40px;}
/* top radial glow */
#topglow{position:fixed;top:-15%;left:50%;transform:translateX(-50%);width:80vw;height:50vh;
  background:radial-gradient(ellipse,rgba(57,255,143,0.06),transparent 70%);
  pointer-events:none;z-index:0;}

.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:20px 14px 0;
  display:flex;flex-direction:column;gap:0;min-height:100vh;}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:14px;
  padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.logo-mark{font-family:'Orbitron';font-size:clamp(16px,5vw,24px);font-weight:900;
  letter-spacing:5px;line-height:1;color:var(--green);
  text-shadow:0 0 20px rgba(57,255,143,0.5),0 0 50px rgba(57,255,143,0.2);}
.logo-mark span{opacity:0.4;}
.logo-sub{font-size:7.5px;letter-spacing:3px;color:var(--dim);margin-top:5px;}
.hdr-right{margin-left:auto;text-align:right;font-size:8.5px;letter-spacing:1px;color:var(--dim);line-height:2;flex-shrink:0;}
.status-inline{display:flex;align-items:center;gap:5px;justify-content:flex-end;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:blink 1.3s ease-in-out infinite;}
.dot.off{background:var(--red);box-shadow:0 0 8px var(--red);animation:none;}
.badge{font-size:7.5px;letter-spacing:2px;padding:3px 9px;margin-top:2px;display:inline-block;}
.badge-live{background:rgba(57,255,143,0.08);color:var(--green);border:1px solid rgba(57,255,143,0.3);}
.badge-dry{background:rgba(255,210,0,0.06);color:var(--yellow);border:1px solid rgba(255,210,0,0.25);}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.15}}
@keyframes scanline{0%{transform:translateY(0)}100%{transform:translateY(28px)}}
#beto-scan{animation:scanline 1.8s linear infinite;}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-bottom:14px;}
.stat-box{
  border:1px solid var(--border);padding:14px 10px;text-align:center;
  background:rgba(0,0,0,0.45);}
.stat-box+.stat-box{border-left:none;}
.s-lbl{font-size:7px;letter-spacing:2.5px;color:var(--dim);margin-bottom:8px;text-transform:uppercase;}
.s-val{font-family:'Orbitron';font-size:clamp(17px,4.5vw,26px);font-weight:900;line-height:1;}
.s-sub{font-size:7.5px;color:var(--dim);margin-top:5px;}
.c-green{color:var(--green);text-shadow:0 0 14px rgba(57,255,143,0.5);}
.c-blue{color:#7dd3ff;text-shadow:0 0 14px rgba(125,211,255,0.4);}
.c-red{color:var(--red);text-shadow:0 0 12px rgba(255,61,110,0.4);}
.c-neutral{color:#c8e8d8;}
.c-yellow{color:var(--yellow);}

/* ── PANEL HEADER ── */
.panel-hd{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(57,255,143,0.04);border:1px solid var(--border);
  padding:8px 14px;border-bottom:none;}
.p-title{font-family:'Orbitron';font-size:8px;letter-spacing:3px;color:var(--green);opacity:0.7;}
.p-meta{font-size:8px;color:var(--dim);}
/* macOS dots */
.dots{display:flex;gap:5px;}
.d{width:9px;height:9px;border-radius:50%;}
.d-r{background:#ff5f57;opacity:.7;}
.d-y{background:#ffbd2e;opacity:.7;}
.d-g{background:#28c940;opacity:.7;}

/* ── TRADES TABLE ── */
.trades-wrap{border:1px solid var(--border);border-top:none;
  background:rgba(0,0,0,0.5);margin-bottom:14px;min-height:58px;}
.trade-row{
  display:grid;grid-template-columns:1fr 58px 58px 58px;
  padding:9px 14px;border-bottom:1px solid rgba(57,255,143,0.06);
  gap:6px;align-items:center;}
.trade-row:last-child{border-bottom:none;}
.tr-q{font-size:9px;color:var(--green);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tr-meta{font-size:7.5px;color:var(--dim);margin-top:2px;}
.league-tag{font-size:6.5px;letter-spacing:1px;padding:1px 5px;
  background:rgba(57,255,143,0.07);border:1px solid rgba(57,255,143,0.18);
  color:var(--green);opacity:0.7;margin-right:4px;}
.tr-num{font-family:'Orbitron';font-size:11px;text-align:right;}
.empty-tr{text-align:center;padding:20px;color:var(--dim);font-size:8.5px;letter-spacing:2px;}

/* ── LOG ── */
.log-wrap{border:1px solid var(--border);border-top:none;
  background:rgba(0,0,0,0.55);height:320px;overflow-y:auto;
  padding:10px 12px;margin-bottom:0;flex:1;}
.log-wrap::-webkit-scrollbar{width:3px;}
.log-wrap::-webkit-scrollbar-thumb{background:rgba(57,255,143,0.15);}
.ll{display:flex;gap:8px;line-height:2.1;}
.lt{color:rgba(57,255,143,0.2);flex-shrink:0;font-size:8px;padding-top:1px;}
.lok {font-size:9px;color:var(--green);}
.lerr{font-size:9px;color:var(--red);}
.lwarn{font-size:9px;color:var(--yellow);}
.linfo{font-size:9px;color:var(--dim);}

/* ── FOOTER ── */
footer{position:relative;z-index:1;border-top:1px solid var(--border);
  padding:20px 14px 32px;text-align:center;margin-top:14px;}
.x-link{display:inline-flex;align-items:center;gap:8px;text-decoration:none;
  color:var(--dim);font-size:9px;letter-spacing:3px;
  border:1px solid var(--border);padding:9px 20px;}
.x-link:active{color:var(--green);}
.f-sub{margin-top:8px;font-size:7px;letter-spacing:2px;color:rgba(57,255,143,0.12);}
</style>
</head>
<body>
<div id="topglow"></div>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <svg width="56" height="56" viewBox="0 0 320 320"
      style="flex-shrink:0;filter:drop-shadow(0 0 8px rgba(57,255,143,0.4))">
      <defs>
        <linearGradient id="fb" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#39ff8f" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#1a9955" stop-opacity="0.95"/>
        </linearGradient>
        <linearGradient id="fe" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#39ff8f" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#00dd77" stop-opacity="0.7"/>
        </linearGradient>
        <linearGradient id="ft" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#39ff8f" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#00ffaa" stop-opacity="0.9"/>
        </linearGradient>
        <filter id="fg" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="fc"><rect x="142" y="132" width="36" height="28" rx="4"/></clipPath>
      </defs>
      <polygon points="160,85 218,140 205,215 115,215 102,140" fill="url(#fb)"/>
      <polygon points="160,85 218,140 205,215 115,215 102,140" fill="none" stroke="#39ff8f" stroke-width="1.5" stroke-opacity="0.45"/>
      <polygon points="130,95 90,45 155,75" fill="url(#fb)"/>
      <polygon points="130,95 90,45 155,75" fill="none" stroke="#39ff8f" stroke-width="1.5" stroke-opacity="0.45"/>
      <polygon points="128,90 100,55 146,76" fill="url(#fe)" opacity="0.65"/>
      <polygon points="190,95 230,45 165,75" fill="url(#fb)"/>
      <polygon points="190,95 230,45 165,75" fill="none" stroke="#39ff8f" stroke-width="1.5" stroke-opacity="0.45"/>
      <polygon points="192,90 220,55 174,76" fill="url(#fe)" opacity="0.65"/>
      <polygon points="132,170 188,170 180,215 140,215" fill="#050e08" fill-opacity="0.65"/>
      <polygon points="160,174 167,180 160,186 153,180" fill="#39ff8f" opacity="0.9" filter="url(#fg)"/>
      <rect x="114" y="132" width="32" height="24" rx="5" fill="#050e08" stroke="#39ff8f" stroke-width="1.2" stroke-opacity="0.45"/>
      <ellipse cx="130" cy="144" rx="8" ry="9" fill="#39ff8f" opacity="0.55"/>
      <ellipse cx="130" cy="144" rx="4" ry="5" fill="#010a04"/>
      <rect x="142" y="132" width="36" height="28" rx="5" fill="#050e08" stroke="#39ff8f" stroke-width="1.5" stroke-opacity="0.9" filter="url(#fg)"/>
      <rect id="beto-scan" x="142" y="132" width="36" height="3" fill="#39ff8f" opacity="0.38" clip-path="url(#fc)"/>
      <ellipse cx="160" cy="146" rx="10" ry="10" fill="none" stroke="#39ff8f" stroke-width="1.2" stroke-opacity="0.7" filter="url(#fg)"/>
      <ellipse cx="160" cy="146" rx="4" ry="4" fill="#39ff8f" opacity="0.9" filter="url(#fg)"/>
      <line x1="142" y1="146" x2="150" y2="146" stroke="#39ff8f" stroke-width="0.8" stroke-opacity="0.5"/>
      <line x1="170" y1="146" x2="178" y2="146" stroke="#39ff8f" stroke-width="0.8" stroke-opacity="0.5"/>
      <line x1="160" y1="132" x2="160" y2="140" stroke="#39ff8f" stroke-width="0.8" stroke-opacity="0.5"/>
      <line x1="160" y1="152" x2="160" y2="160" stroke="#39ff8f" stroke-width="0.8" stroke-opacity="0.5"/>
      <line x1="105" y1="155" x2="118" y2="168" stroke="#39ff8f" stroke-width="1.8" stroke-opacity="0.35" stroke-linecap="round"/>
      <path d="M205,215 Q250,190 245,140 Q240,100 215,105" fill="none" stroke="url(#ft)" stroke-width="7" stroke-linecap="round" stroke-opacity="0.45"/>
      <rect x="198" y="97" width="3.5" height="8" rx="1" fill="#39ff8f" opacity="0.5"/>
      <rect x="203" y="92" width="3.5" height="13" rx="1" fill="#39ff8f" opacity="0.62"/>
      <rect x="208" y="85" width="3.5" height="20" rx="1" fill="#39ff8f" opacity="0.72"/>
      <rect x="213" y="77" width="3.5" height="28" rx="1" fill="#39ff8f" opacity="0.82"/>
      <rect x="218" y="67" width="3.5" height="38" rx="1" fill="#39ff8f" opacity="0.95" filter="url(#fg)"/>
    </svg>

    <div>
      <div class="logo-mark">BETO<span>.GG</span></div>
      <div class="logo-sub">PREDICTION MARKET ENGINE // v4.2.1</div>
    </div>

    <div class="hdr-right">
      <div id="hdr-time">—</div>
      <div class="status-inline">
        <div class="dot" id="sdot"></div>
        <span id="stxt" style="font-size:8px">CONNECTING</span>
      </div>
      <div class="badge badge-dry" id="mbadge">◎ DRY RUN</div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stat-row">
    <div class="stat-box">
      <div class="s-lbl">Balance</div>
      <div class="s-val c-blue" id="balance">$—</div>
      <div class="s-sub" id="bal-sub">buying power</div>
    </div>
    <div class="stat-box">
      <div class="s-lbl">Session P/L</div>
      <div class="s-val c-neutral" id="pnl">+$0.00</div>
      <div class="s-sub" id="pnl-sub">open $0.00</div>
    </div>
    <div class="stat-box">
      <div class="s-lbl">Record</div>
      <div class="s-val c-green" id="record">—</div>
      <div class="s-sub" id="rec-sub">0 active</div>
    </div>
  </div>

  <!-- ACTIVE TRADES -->
  <div class="panel-hd">
    <div class="dots"><div class="d d-r"></div><div class="d d-y"></div><div class="d d-g"></div></div>
    <span class="p-title">ACTIVE TRADES</span>
    <span class="p-meta" id="trades-meta">0 open</span>
  </div>
  <div class="trades-wrap" id="trades-body">
    <div class="empty-tr">> NO ACTIVE POSITIONS_</div>
  </div>

  <!-- SYSTEM LOG -->
  <div class="panel-hd">
    <div class="dots"><div class="d d-r"></div><div class="d d-y"></div><div class="d d-g"></div></div>
    <span class="p-title">SYSTEM LOG — LIVE OUTPUT</span>
    <span class="p-meta" id="log-meta">—</span>
  </div>
  <div class="log-wrap" id="log-body">
    <div class="ll"><span class="lt">[BOOT]</span><span class="linfo">> BETO.GG INITIALIZING...</span></div>
  </div>

</div><!-- end wrap -->

<!-- FOOTER -->
<footer>
  <a class="x-link" href="https://x.com/0xblaq?s=11" target="_blank" rel="noopener">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
    BUILT BY 0XBLAQ
  </a>
  <div class="f-sub">BETO.GG // AUTOMATED PREDICTION MARKETS</div>
</footer>

<script>
'use strict';

// Clock
function tick(){
  const now=new Date();
  document.getElementById('hdr-time').textContent=now.toISOString().replace('T',' ').slice(0,19)+' UTC';
}
tick(); setInterval(tick,1000);

// Render log
function renderLog(logs){
  const el=document.getElementById('log-body');
  if(!logs||!logs.length){
    el.innerHTML='<div class="ll"><span class="lt">[—]</span><span class="linfo">> AWAITING DATA_</span></div>';
    return;
  }
  // newest first in the raw array — reverse so log reads top=old, bottom=new
  const items=[...logs].reverse();
  el.innerHTML=items.map(l=>{
    const ts=(l.ts||'').slice(11,19)||'--:--:--';
    const msg='> '+(l.msg||'').slice(0,100);
    const cls='l'+(l.type||'info');
    return `<div class="ll"><span class="lt">[${ts}]</span><span class="${cls}">${msg}</span></div>`;
  }).join('');
  document.getElementById('log-meta').textContent=logs.length+' lines';
  el.scrollTop=el.scrollHeight;
}

// Render trades
function renderTrades(bets){
  const el=document.getElementById('trades-body');
  const active=(bets||[]).filter(b=>!b.settledAt&&(b.status==='open'||b.status==='active'||!b.status));
  document.getElementById('trades-meta').textContent=active.length+' open';
  if(!active.length){
    el.innerHTML='<div class="empty-tr">> NO ACTIVE POSITIONS_</div>';
    return;
  }
  el.innerHTML=active.map(b=>{
    const cost=parseFloat(b.cost||b.sizeUsd||0).toFixed(2);
    const price=parseFloat(b.fillPrice||b.entryPrice||0);
    const payout=parseFloat(b.payout||b.potentialPayout||0).toFixed(2);
    const op=parseFloat(b.openPnl||0);
    const opc=op>0?'c-green':op<0?'c-red':'c-neutral';
    const lg=b.league||b.sport||'—';
    const q=(b.question||b.market||'Unknown market').slice(0,45);
    const oSign=op>=0?'+':'';
    return `<div class="trade-row">
      <div>
        <div class="tr-q">> ${q}</div>
        <div class="tr-meta"><span class="league-tag">${lg}</span>$${cost} @ ${price?Math.round(price*100)+'¢':'—'}</div>
      </div>
      <div class="tr-num c-blue">$${payout}</div>
      <div class="tr-num ${opc}">${oSign}$${Math.abs(op).toFixed(2)}</div>
      <div class="tr-num" style="font-size:7.5px;color:var(--dim)">${(b.ts||'').slice(11,16)||'—'}</div>
    </div>`;
  }).join('');
}

// Main poll
async function refresh(){
  try{
    const [rootR,logR]=await Promise.allSettled([
      fetch('/').then(r=>r.json()),
      fetch('/log').then(r=>r.json()),
    ]);

    document.getElementById('sdot').className='dot';
    document.getElementById('stxt').textContent='ONLINE';

    if(rootR.status==='fulfilled'){
      const root=rootR.value;
      const s=root.stats||{};
      const isDry=root.settings?.dryRun!==false;
      const sp=s.sports||{};

      const badge=document.getElementById('mbadge');
      badge.textContent=isDry?'◎ DRY RUN':'⬤ LIVE';
      badge.className='badge '+(isDry?'badge-dry':'badge-live');

      // Balance
      const bp=parseFloat(s.buyingPower??s.liveBalance??s.dryBalance??0);
      document.getElementById('balance').textContent='$'+bp.toFixed(2);
      document.getElementById('bal-sub').textContent=isDry?'paper balance':'buying power';

      // P/L
      const pnl=parseFloat(sp.totalPnl??sp.pnl??0);
      const pnlEl=document.getElementById('pnl');
      pnlEl.textContent=(pnl>=0?'+':'')+'$'+Math.abs(pnl).toFixed(2);
      pnlEl.className='s-val '+(pnl>0?'c-green':pnl<0?'c-red':'c-neutral');
      const op=parseFloat(sp.openPnl??0);
      document.getElementById('pnl-sub').textContent='open '+(op>=0?'+':'')+'$'+Math.abs(op).toFixed(2);

      // Record
      const w=sp.wins||0,l=sp.losses||0,a=sp.activeBets||0;
      document.getElementById('record').textContent=w+'W/'+l+'L';
      document.getElementById('rec-sub').textContent=a+' active · '+(sp.totalBets||0)+' placed';

      // Trades
      renderTrades(sp.bets||root.bets||[]);
    }

    if(logR.status==='fulfilled'){
      renderLog((logR.value||[]).slice(0,80));
    }

  }catch(e){
    document.getElementById('sdot').className='dot off';
    document.getElementById('stxt').textContent='OFFLINE';
  }
}

setInterval(refresh,3000);
refresh();
</script>
</body>
</html>
